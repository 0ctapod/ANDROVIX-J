<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/resgistro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>ANDROVIX-J | Log In</title>
</head>
<body>

    <main>

        <section class="contenedor-principal">

            <!-- LADO IZQUIERDO -->
            <div class="marca">

                <!-- Logo, titulo e informacion -->
                <div>
                    <img class="marca__logo" src="/assets/img/Logo.png" alt="Logo">

                    <div class="marca-titulo-contenedor">

                        <div class="marca__linea"></div>
                        <p class="marca__titulo">BIENVENIDOS</p>
                    </div>

                    <p class="marca__mensaje">ACCEDE A TU UNIVERSO</p>
                    <p class="marca__mensaje2">CONECTA. <br>
                        EXPLORA. <br>
                        DOMINA EL FUTURO. <br>
                    </p>
                    
                </div>

                <div>
                    <p class="marca__copyright">&copy ANDROVIX-J 
                        Todos los derechos reservados</p>
                </div>

            </div>


            <!-- LADO DERECHO -->
            <div class="formulario-contenedor">

                <form class="formulario" action="">

                    <h2 class="formulario__titulo">REGISTRO</h2>

                    <div class="separador-neon">
                        <div class="separador__rombo"></div>
                    </div>

                    <!-- Inputs del usuario -->
                    <div class="input">

                        <!-- Input nombre -->
                        <div class="input__grupo">
                            <label class="input__nombre" for="nombre">Nombre</label>

                            <div class="input__apartados">
                                <i class="fa-regular fa-user"></i>
                                <input class="input__campo" type="text" name="nombre" id="nombre" placeholder="Tu nombre" required>
                            </div>
                        </div>

                        <!-- Input correo -->
                        <div class="input__grupo">
                            <label class="input__nombre" for="correo">Correo</label>

                            <div class="input__apartados">
                                <i class="fa-solid fa-at"></i>
                                <input class="input__campo" type="email" name="correo" id="correo" placeholder="ejemplo@gmail.com" required>
                            </div>
                        </div>


                        <!-- Input contraseña -->
                        <div class="input__grupo">
                            <label class="input__nombre" for="contraseña">Contraseña</label>

                            <div class="input__apartados">
                                <i class="fa-solid fa-lock"></i>
                                <input class="input__campo" type="password" name="contraseña" id="contraseña" placeholder="Tu contraseña" required>
                            </div>
                        </div>

                        <!-- Input repetir contraseña -->
                        <div class="input__grupo">
                            <label class="input__nombre" for="repetirContraseña">Repetir Contraseña</label>

                            <div class="input__apartados">
                                <i class="fa-solid fa-lock"></i>
                                <input class="input__campo" type="password" name="repetirContraseña" id="repetirContraseña" placeholder="Contraseña de nuevo" required>
                            </div>
                        </div>

                        <input class="input__boton-enviar" type="submit" value="REGISTRARSE">

                    </div>           

                </form>
            </div>

        </section>

    </main>
    
</body>
</html>
