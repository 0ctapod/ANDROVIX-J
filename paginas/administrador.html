<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel de administración de productos de ANDROVIX-J.">
    <title>Administrador | ANDROVIX-J</title>

    <!-- Bootstrap base para grid, espaciados, utilidades y componentes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Fuente -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/navbar.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="stylesheet" href="../assets/css/administrador.css">
</head>

<body>
    <!-- ========================================================= -->
    <!-- INICIO: Encabezado principal de administrador             -->
    <!-- ========================================================= -->
    <header class="encabezado-principal" id="inicio">
        <div id="contenedor-navbar"></div>

        <section class="seccion-hero-administrador d-flex align-items-center">
            <div class="container py-5">
                <div class="row justify-content-center justify-content-lg-start">
                    <div class="col-12 col-lg-8 col-xxl-7">
                        <div class="contenido-hero-administrador">
                            <p class="etiqueta-hero mb-3">Panel interno</p>
                            <h1 class="titulo-principal titulo-principal-admin efecto-glitch" data-text="ADMINISTRADOR">
                                ADMINISTRADOR
                            </h1>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </header>
    <!-- ========================================================= -->
    <!-- FIN: Encabezado principal de administrador                -->
    <!-- ========================================================= -->

    <!-- ========================================================= -->
    <!-- INICIO: Contenido principal                               -->
    <!-- ========================================================= -->
    <main class="seccion-administrador py-5 py-lg-6">
        <div class="container">
            <div class="row justify-content-center mb-4 mb-lg-5">
                <div class="col-lg-10 text-center">
                    <p class="subtitulo-seccion mb-2">Gestión de productos</p>
                    <h2 class="titulo-seccion efecto-glitch" data-text="CREAR PRODUCTO">CREAR PRODUCTO</h2>
                    <span class="linea-destacada" aria-hidden="true"></span>
                </div>
            </div>

            <section class="panel-administrador">
                <!-- ================================================= -->
                <!-- INICIO: Formulario de administrador               -->
                <!-- ================================================= -->
                <form id="formulario-producto" class="formulario-administrador" novalidate>
                    <h3 class="titulo-panel">Datos del producto</h3>

                    <div class="fila-formulario">
                        <label class="campo-formulario" for="inputNombreProducto">
                            Nombre del producto
                            <input type="text" id="inputNombreProducto" name="nombre" placeholder="Ej: Chaqueta Neon"
                                maxlength="80" required>
                        </label>

                        <label class="campo-formulario" for="inputCategoriaProducto">
                            Categoría
                            <select id="inputCategoriaProducto" name="categoria" required>
                                <option value="">Selecciona una categoría</option>
                                <option value="Chaquetas">Chaquetas</option>
                                <option value="Camisetas">Camisetas</option>
                                <option value="Pantalones">Pantalones</option>
                                <option value="Accesorios">Accesorios</option>
                                <option value="Calzado">Calzado</option>
                            </select>
                        </label>
                    </div>

                    <div class="fila-formulario">
                        <label class="campo-formulario" for="inputPrecioProducto">
                            Precio
                            <input type="number" id="inputPrecioProducto" name="precio" placeholder="Ej: 189900"
                                min="0" required>
                        </label>

                        <label class="campo-formulario" for="inputStockProducto">
                            Stock
                            <input type="number" id="inputStockProducto" name="stock" placeholder="Ej: 8" min="0"
                                required>
                        </label>
                    </div>

                    <label class="campo-formulario" for="inputImagenProducto">
                        Nombre del archivo de Imagen
                        <input type="url" id="inputImagenProducto" name="imagen"
                            placeholder="Ej: mochila-kernel.jpg" required>
                    </label>

                    <label class="campo-formulario" for="inputDescripcionProducto">
                        Descripción
                        <textarea id="inputDescripcionProducto" name="descripcion" rows="5"
                            placeholder="Describe el producto..." maxlength="300" required></textarea>
                    </label>

                    <div id="mensaje-admin" class="mensaje-admin" role="alert" aria-live="polite"></div>

                    <button type="submit" class="boton-principal-admin">
                        Guardar producto
                    </button>
                </form>
                <!-- ================================================= -->
                <!-- FIN: Formulario de administrador                  -->
                <!-- ================================================= -->
            </section>
        </div>
    </main>
    <!-- ========================================================= -->
    <!-- FIN: Contenido principal                                  -->
    <!-- ========================================================= -->

    <div id="contenedor-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/paginas/administrador.js"></script>
</body>

</html>
